<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
<form action="#" method="post" id="registrationForm" class="registration-form">
    <h2>Registration Form</h2>
    <div class="field">
        <label for="fullname">Full Name: </label><br>
        <input type="text" id="fullname" name="fullname" autofocus maxlength="60"><br>
        <p id="fullnameError" class="error"></p>
    </div>
    <div class="field">
        <label for="email">Email: </label><br>
        <input type="email" id="email" name="email" maxlength="60"><br>
        <p id="emailError" class="error"></p>
    </div>
    <div class="field">
        <label for="phone">Phone Number: </label><br>
        <input type="tel" id="phone" name="phone" maxlength="15"><br>
        <p id="phoneError" class="error"></p>
    </div>
    <div class="field">
        <label for="password">Password: </label><br>
        <input type="password" id="password" name="password"><br>
        <p id="passwordError" class="error"></p>
    </div>
    <div class="field">
        <label for="confirm_password">Confirm Password: </label><br>
        <input type="password" id="confirm_password" name="confirm_password"><br>
        <p id="confirmPasswordError" class="error"></p>
    </div>
    <div class="field">
        <button type="submit">Register</button>
    </div>
    <p id="validationMessage" class="success"></p>
</form>
<script src="js/script.js"></script>
<script>
    // JavaScript code to validate the form
   formValidations();
</script>
</body>
</html>
